name: "astrbot_plugin_private_proactive_reply"
display_name: "私聊智能主动回复"
author: "chiriu & 橘雪莉"
version: "v0.6.1"
desc: "轻量私聊主动回复插件：监听私聊活跃，在沉默一段时间后基于人格与上下文生成自然主动消息。支持 LLM 自主排期下一次主动回复时机。"
repo: "https://github.com/kazamisama/astrbot_plugin_private_proactive_reply"
astrbot_version: ">=4.8.0"
help: |
  注册私聊主动回复：当用户沉默一段时间后，调用当前会话 LLM 生成一句自然主动消息。
  LLM 可通过 schedule_private_proactive_reply 工具自主安排下一次主动回复时机。
  默认拦截非好友私聊/群临时会话，避免群临时会话触发主动回复。
support_platforms:
  - aiocqhttp
  - qq_official
  - telegram
  - wecom
  - lark
  - dingtalk
  - kook
  - webchat
